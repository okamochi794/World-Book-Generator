<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Book Generator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Custom SVG Icons to avoid external asset dependency ---
        const PlusIcon = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
        );

        const CopyIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
        );

        const CheckIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
        );

        const DownloadIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
        );

        const UploadIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
            </svg>
        );

        const RefreshIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
        );

        const InfoIcon = () => (
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.083.984l-.04.016a.75.75 0 01-1.083-.984zM12 3a9 9 0 100 18 9 9 0 000-18z" />
            </svg>
        );

        const TrashIcon = () => (
            <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
            </svg>
        );

        // --- Common UI Components ---
        const Label = ({ children, tooltip }) => (
            <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-1 select-none">
                {children}
                {tooltip && (
                    <span className="group relative cursor-help text-slate-400 hover:text-slate-600">
                        <InfoIcon />
                        <span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block w-48 p-2 bg-slate-800 text-white text-xs rounded shadow-lg z-10 font-normal normal-case">
                            {tooltip}
                        </span>
                    </span>
                )}
            </label>
        );

        const Input = ({ label, tooltip, ...props }) => (
            <div className="mb-4">
                <Label tooltip={tooltip}>{label}</Label>
                <input
                    className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm bg-white"
                    {...props}
                />
            </div>
        );

        const Textarea = ({ label, tooltip, rows = 3, ...props }) => (
            <div className="mb-4">
                <Label tooltip={tooltip}>{label}</Label>
                <textarea
                    rows={rows}
                    className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm resize-y bg-white"
                    {...props}
                />
            </div>
        );

        // --- Custom Modal component to replace alert/confirm ---
        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl max-w-sm w-full p-6 shadow-xl border border-slate-200">
                        <h3 className="text-lg font-bold text-slate-900 mb-2">{title}</h3>
                        <p className="text-sm text-slate-500 mb-6">{message}</p>
                        <div className="flex justify-end gap-3">
                            <button 
                                onClick={onCancel}
                                className="px-4 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 rounded-lg transition-colors"
                            >
                                キャンセル
                            </button>
                            <button 
                                onClick={onConfirm}
                                className="px-4 py-2 text-sm font-medium bg-red-600 hover:bg-red-700 text-white rounded-lg shadow-sm transition-colors"
                            >
                                クリアする
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        function App() {
            const [copied, setCopied] = useState(false);
            const [showConfirm, setShowConfirm] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            
            // Meta Settings
            const [keywordLogic, setKeywordLogic] = useState('_or_');
            const [keywords, setKeywords] = useState('');
            const [group, setGroup] = useState('');
            const [keyRegion, setKeyRegion] = useState(6); // 初期値を 3（システム+ユーザー）から 6（ユーザー+AI）へ変更
            const [valueRegion, setValueRegion] = useState(1);
            const [sortOrder, setSortOrder] = useState(0);
            const [depth, setDepth] = useState(0);
            const [probability, setProbability] = useState(100);
            const [matchType, setMatchType] = useState(2);
            const [enable, setEnable] = useState(true);

            // Content Text
            const [valueText, setValueText] = useState('');
            
            // Saved Entries List
            const [entries, setEntries] = useState([]);

            // テキストからキャラクター名などを抽出する関数
            const extractKeyword = (text) => {
                const patterns = [
                    /キャラクター[『「](.+?)[』」]/, // 「キャラクター『〇〇』」
                    /あなたは[、\s]*.*?キャラクター[『「](.+?)[』」]です/,
                    /『(.+?)』です/, // 「『〇〇』です。」
                    /名前[：:\s]+([^\n]+)/, // 「名前：〇〇」
                    /あなたは[「『](.+?)[」』]/ // 「あなたは『〇〇』」
                ];
                for (let pattern of patterns) {
                    const match = text.match(pattern);
                    if (match && match[1]) {
                        return match[1].trim();
                    }
                }
                return "";
            };

            const processFiles = async (filesArray) => {
                if (filesArray.length === 0) return;

                if (filesArray.length === 1) {
                    // 単一ファイルの場合はフォームにセット
                    const file = filesArray[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const text = event.target.result;
                        setValueText(text); // Valueにテキストをセット

                        const keyword = extractKeyword(text);
                        if (keyword) {
                            setKeywords(keyword); // 抽出したキーワードをセット
                        } else {
                            // 抽出に失敗した場合、ファイル名（自動生成系でない場合）をキーワードの候補にする
                            const fileNameKeyword = file.name.replace(/\.[^/.]+$/, "");
                            if (!fileNameKeyword.startsWith("gemini-code")) {
                                setKeywords(fileNameKeyword);
                            }
                        }
                    };
                    reader.readAsText(file);
                } else {
                    // 複数ファイルの場合は現在の設定でリストに直接一括追加
                    const newEntries = [];
                    for (const file of filesArray) {
                        const text = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (event) => resolve(event.target.result);
                            reader.readAsText(file);
                        });

                        const extractedKeyword = extractKeyword(text);
                        let finalKeywords = "";
                        
                        if (extractedKeyword) {
                            finalKeywords = extractedKeyword;
                        } else {
                            const fileNameKeyword = file.name.replace(/\.[^/.]+$/, "");
                            if (!fileNameKeyword.startsWith("gemini-code")) {
                                finalKeywords = fileNameKeyword;
                            }
                        }

                        const defaultKey = `${keywordLogic}未設定`;
                        const formattedKeywords = finalKeywords ? finalKeywords.split(/[,、]/).map(k => k.trim()).filter(k => k) : [];
                        const finalKeyString = formattedKeywords.length > 0 ? `${keywordLogic}${formattedKeywords.join('@wb@')}` : defaultKey;

                        newEntries.push({
                            key: finalKeyString,
                            value: text,
                            group: group,
                            key_region: Number(keyRegion),
                            value_region: Number(valueRegion),
                            sort: Number(sortOrder),
                            depth: Number(depth),
                            probability: Number(probability),
                            match_type: Number(matchType),
                            enable: enable
                        });
                    }
                    setEntries(prev => [...prev, ...newEntries]);
                }
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                await processFiles(files);
                e.target.value = '';
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = async (e) => {
                e.preventDefault();
                setIsDragging(false);
                
                // ドロップされたファイルのうち、.txtファイルのみを抽出して処理
                const files = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.txt'));
                if (files.length > 0) {
                    await processFiles(files);
                }
            };

            const generateKeyString = () => {
                const defaultKey = `${keywordLogic}未設定`;
                if (!keywords.trim()) return defaultKey;
                const formattedKeywords = keywords.split(/[,、]/).map(k => k.trim()).filter(k => k);
                if (formattedKeywords.length === 0) return defaultKey;
                return `${keywordLogic}${formattedKeywords.join('@wb@')}`;
            };

            const handleAddEntry = () => {
                if (!keywords.trim() && !valueText.trim()) return;

                const newEntry = {
                    key: generateKeyString(),
                    value: valueText,
                    group: group,
                    key_region: Number(keyRegion),
                    value_region: Number(valueRegion),
                    sort: Number(sortOrder),
                    depth: Number(depth),
                    probability: Number(probability),
                    match_type: Number(matchType),
                    enable: enable
                };

                setEntries([...entries, newEntry]);
                
                // Keep settings but clear transient texts
                setKeywords('');
                setValueText('');
            };

            const handleDeleteEntry = (indexToDelete) => {
                setEntries(entries.filter((_, idx) => idx !== indexToDelete));
            };

            const generateJSON = () => {
                const currentEntry = (keywords.trim() || valueText.trim()) ? {
                    key: generateKeyString(),
                    value: valueText,
                    group: group,
                    key_region: Number(keyRegion),
                    value_region: Number(valueRegion),
                    sort: Number(sortOrder),
                    depth: Number(depth),
                    probability: Number(probability),
                    match_type: Number(matchType),
                    enable: enable
                } : null;

                const allEntries = [...entries];
                if (currentEntry) {
                    allEntries.push(currentEntry);
                }

                const finalJson = {
                    "_comment": [
                        "世界书模板使用说明：",
                        "key为触发关键词，前面使用_and_为与（即同时命中后述关键词可触发世界书），_or_为或（即命中任意后续关键词可触发世界书），关键词之间用@wb@连接",
                        "Value代表世界书的内容，请在此写入世界书",
                        "group为分类，默认为空，同一group值在导入后将进入同一分类中",
                        "key_region代表代表触发区域，1为系统，2为用户，3为系统+用户，4为AI，5为系统+AI，6为用户+AI，7为系统+用户+AI",
                        "value_region代表影响范围，1为提示词，2为前置词，3为提示词+前置词, 4为后置词，5为提示词+後置詞，6为前置詞+後置詞，7为提示詞+前置詞+後置詞",
                        "sort代表插入顺序",
                        "Depth代表扫描深度，取值范围为0-20",
                        "probability代表触发概率，取值范围为1-100",
                        "match_type代表关键词格式，2为选项，3为正则，默认为2",
                        "enable代表是否开启世界书，true为开启，false为关闭",
                        "下述模板可复制后多次使用，支持在1个json中导入多个世界书"
                    ],
                    "world_book": allEntries
                };
                
                return JSON.stringify(finalJson, null, 2);
            };

            const handleCopy = () => {
                const jsonText = generateJSON();
                try {
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(jsonText)
                            .then(() => triggerCopySuccess())
                            .catch(() => fallbackCopy(jsonText));
                    } else {
                        fallbackCopy(jsonText);
                    }
                } catch (err) {
                    fallbackCopy(jsonText);
                }
            };

            const fallbackCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; 
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    triggerCopySuccess();
                } catch (err) {
                    console.error('Fallback Copy Failed', err);
                }
                document.body.removeChild(textArea);
            };

            const triggerCopySuccess = () => {
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const handleClearClick = () => {
                if (keywords.trim() || valueText.trim()) {
                    setShowConfirm(true);
                } else {
                    clearForm();
                }
            };

            const clearForm = () => {
                setKeywords(''); 
                setValueText('');
                setShowConfirm(false);
            };

            const handleDownload = () => {
                const blob = new Blob([generateJSON()], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `world_book_entry.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-6 select-text">
                    <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-6">
                        
                        {/* Left Column: Form */}
                        <div className="w-full lg:w-3/5 space-y-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <h1 className="text-2xl font-bold text-slate-800 mb-2">World Book Generator</h1>
                                <p className="text-slate-500 text-sm mb-6">テンプレートに沿って入力するだけで、AI用の世界書JSONを生成します。</p>

                                {/* File Upload Section */}
                                <div 
                                    className={`mb-6 p-5 rounded-xl border-2 border-dashed transition-all duration-200 flex flex-col sm:flex-row items-center justify-between gap-4 ${isDragging ? 'bg-blue-100 border-blue-500 shadow-inner scale-[1.02]' : 'bg-blue-50 border-blue-300 hover:border-blue-400'}`}
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                >
                                    <div className="text-center sm:text-left w-full sm:w-auto pointer-events-none">
                                        <h3 className="text-sm font-bold text-blue-800">テキストファイルから読み込む</h3>
                                        <p className="text-xs text-blue-600 mt-1">
                                            .txt ファイルをここにドラッグ＆ドロップするか、ボタンから選択して自動入力します。<br/>
                                            複数ファイルをドロップした場合は、現在の設定で直接リストに一括追加されます。
                                        </p>
                                    </div>
                                    <label className="cursor-pointer flex items-center justify-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm whitespace-nowrap shrink-0">
                                        <UploadIcon /> ファイルを選択
                                        <input type="file" accept=".txt" multiple className="hidden" onChange={handleFileUpload} />
                                    </label>
                                </div>

                                {/* Meta Settings */}
                                <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-6">
                                    <h2 className="text-lg font-semibold text-slate-700 mb-4 border-b pb-2">システム設定 (Meta)</h2>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <Label tooltip="_and_ (すべて含む) または _or_ (いずれかを含む)">発動条件ロジック</Label>
                                            <select 
                                                value={keywordLogic} 
                                                onChange={e => setKeywordLogic(e.target.value)}
                                                className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 text-sm bg-white outline-none"
                                            >
                                                <option value="_or_">OR (いずれかのキーワードで発動)</option>
                                                <option value="_and_">AND (すべてのキーワードで発動)</option>
                                            </select>
                                        </div>
                                        <Input 
                                            label="トリガーキーワード" 
                                            tooltip="カンマ(,)区切りで入力すると自動で@wb@に変換されます" 
                                            placeholder="例: アリス, Alice, 主人公" 
                                            value={keywords} 
                                            onChange={e => setKeywords(e.target.value)} 
                                        />
                                    </div>

                                    <div className="mt-2 mb-4">
                                        <Input 
                                            label="グループ (Group)" 
                                            tooltip="分類名。インポート時に同じグループ名を持つものは同一カテゴリに入ります" 
                                            placeholder="例: キャラクター, アイテム, 世界観 (空欄でも可)" 
                                            value={group} 
                                            onChange={e => setGroup(e.target.value)} 
                                        />
                                    </div>

                                    {/* Region Configuration */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4 pb-2 border-b border-slate-200/60">
                                        <div>
                                            <Label tooltip="1:システム, 2:ユーザー, 3:システム+ユーザー, 4:AI, 5:システム+AI, 6:ユーザー+AI, 7:システム+ユーザー+AI">トリガー領域 (Key Region)</Label>
                                            <select 
                                                value={keyRegion} 
                                                onChange={e => setKeyRegion(e.target.value)}
                                                className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 text-sm bg-white outline-none"
                                            >
                                                <option value="1">1: システム (System)</option>
                                                <option value="2">2: ユーザー (User)</option>
                                                <option value="3">3: システム + ユーザー</option>
                                                <option value="4">4: AI</option>
                                                <option value="5">5: システム + AI</option>
                                                <option value="6">6: ユーザー + AI</option>
                                                <option value="7">7: システム + ユーザー + AI</option>
                                            </select>
                                        </div>
                                        <div>
                                            <Label tooltip="1:提示詞, 2:前置詞, 3:提示詞+前置詞, 4:後置詞, 5:提示詞+後置詞, 6:前置詞+後置詞, 7:提示詞+前置詞+後置詞">挿入位置・影響範囲 (Value Region)</Label>
                                            <select 
                                                value={valueRegion} 
                                                onChange={e => setValueRegion(e.target.value)}
                                                className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 text-sm bg-white outline-none"
                                            >
                                                <option value="1">1: プロンプト (Prompt)</option>
                                                <option value="2">2: 前置詞 (Prefix)</option>
                                                <option value="3">3: プロンプト + 前置詞</option>
                                                <option value="4">4: 後置詞 (Suffix)</option>
                                                <option value="5">5: プロンプト + 後置詞</option>
                                                <option value="6">6: 前置詞 + 後置詞</option>
                                                <option value="7">7: プロンプト + 前置詞 + 後置詞</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* Numeric & Active Configurations */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-2">
                                        <div>
                                            <Label tooltip="挿入順序。同じ位置に複数の世界書が発動した際の配置優先順位（小さいほど先、または指定ルールに基づく）">順序 (Sort)</Label>
                                            <input type="number" value={sortOrder} onChange={e => setSortOrder(e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm bg-white outline-none" />
                                        </div>
                                        <div>
                                            <Label tooltip="スキャン深度 (0-20)。チャットログを何往復分遡ってキーワードを検索するか">深度 (Depth)</Label>
                                            <input type="number" min="0" max="20" value={depth} onChange={e => setDepth(e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm bg-white outline-none" />
                                        </div>
                                        <div>
                                            <Label tooltip="キーワード検出時の発動確率 (1-100)">確率 (Prob %)</Label>
                                            <input type="number" min="1" max="100" value={probability} onChange={e => setProbability(e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm bg-white outline-none" />
                                        </div>
                                        <div className="flex items-center mt-6">
                                            <input type="checkbox" id="enable" checked={enable} onChange={e => setEnable(e.target.checked)} className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500" />
                                            <label htmlFor="enable" className="ml-2 text-sm font-medium text-slate-700 select-none">有効化 (Enable)</label>
                                        </div>
                                    </div>
                                </div>

                                {/* Content Fields */}
                                <h2 className="text-lg font-semibold text-slate-700 mb-4 border-b pb-2 mt-8">世界書の内容 (Value)</h2>
                                
                                <div className="space-y-4">
                                    <Textarea 
                                        label="Value (テキストを貼り付けてください)" 
                                        tooltip="テキストエリア内の改行は、JSON出力時に自動的に「\n」に置換されます" 
                                        rows={18} 
                                        placeholder="ここに世界書のテキスト内容を貼り付けてください。&#10;（例：【キャラクター基本情報】...）&#10;改行を含んだまま貼り付けて問題ありません。" 
                                        value={valueText} 
                                        onChange={e => setValueText(e.target.value)} 
                                    />
                                </div>

                                <div className="mt-8 flex justify-end gap-3">
                                    <button 
                                        onClick={handleClearClick}
                                        className="flex items-center gap-2 px-4 py-2 text-slate-500 hover:bg-slate-100 rounded transition-colors text-sm font-medium"
                                    >
                                        <RefreshIcon /> 入力をクリア
                                    </button>
                                    <button 
                                        onClick={handleAddEntry}
                                        disabled={!keywords.trim() && !valueText.trim()}
                                        className={`flex items-center gap-2 px-6 py-2 font-medium rounded transition-colors ${
                                            !keywords.trim() && !valueText.trim() 
                                            ? 'bg-slate-200 text-slate-400 cursor-not-allowed' 
                                            : 'bg-blue-600 hover:bg-blue-700 text-white shadow-sm'
                                        }`}
                                    >
                                        <PlusIcon /> リストに追加
                                    </button>
                                </div>
                            </div>

                            {/* Added Entries List Managed Section */}
                            {entries.length > 0 && (
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-lg font-bold text-slate-800 mb-4">保存済みのエントリ一覧 ({entries.length} 件)</h2>
                                    <div className="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                                        {entries.map((entry, index) => (
                                            <div key={index} className="flex items-center justify-between p-3 bg-slate-50 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors">
                                                <div className="flex-1 min-w-0 pr-4">
                                                    <div className="text-sm font-semibold text-slate-700 truncate">{entry.key}</div>
                                                    <div className="text-xs text-slate-400 truncate mt-0.5 flex items-center gap-2">
                                                        {entry.group && <span className="bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded text-[10px] font-bold">{entry.group}</span>}
                                                        <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[10px]">KeyRegion: {entry.key_region}</span>
                                                        <span className="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[10px]">ValueRegion: {entry.value_region}</span>
                                                        <span className="truncate">{entry.value.substring(0, 40)}...</span>
                                                    </div>
                                                </div>
                                                <button 
                                                    onClick={() => handleDeleteEntry(index)}
                                                    className="p-1.5 text-red-500 hover:bg-red-50 rounded transition-colors"
                                                    title="削除"
                                                >
                                                    <TrashIcon />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Right Column: Preview */}
                        <div className="w-full lg:w-2/5 relative">
                            <div className="sticky top-6 bg-slate-900 rounded-xl shadow-lg border border-slate-700 overflow-hidden flex flex-col" style={{maxHeight: 'calc(100vh - 3rem)'}}>
                                
                                <div className="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center select-none">
                                    <h2 className="text-slate-200 font-semibold flex items-center gap-2">
                                        <span className="w-3 h-3 rounded-full bg-green-500"></span> JSON Preview
                                        {entries.length > 0 && (
                                            <span className="text-xs bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded ml-2">
                                                {entries.length} 件追加済み
                                            </span>
                                        )}
                                    </h2>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={handleCopy}
                                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded text-sm font-medium transition-colors ${copied ? 'bg-green-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                                        >
                                            {copied ? <CheckIcon /> : <CopyIcon />}
                                            {copied ? 'Copied!' : 'Copy'}
                                        </button>
                                        <button 
                                            onClick={handleDownload}
                                            className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-sm font-medium transition-colors"
                                        >
                                            <DownloadIcon /> DL
                                        </button>
                                    </div>
                                </div>

                                <div className="preview-content p-4 overflow-auto flex-grow bg-[#0f111a] text-slate-300 text-sm font-mono leading-relaxed custom-scrollbar">
                                    <pre className="whitespace-pre-wrap break-all">
                                        <code dangerouslySetInnerHTML={{ __html: generateJSON().replace(/\\n/g, '<span class="text-sky-500/80 font-bold">\\n</span>') }} />
                                    </pre>
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* Custom Dialog for Confirming Clear */}
                    <ConfirmModal 
                        isOpen={showConfirm} 
                        title="入力内容のクリア" 
                        message="現在作成している途中のテキスト（トリガーキーワードとValue）が消去されます。よろしいですか？"
                        onConfirm={clearForm}
                        onCancel={() => setShowConfirm(false)}
                    />

                    {/* Tailwind Custom Styles for specific visual tweaks */}
                    <style dangerouslySetInnerHTML={{__html: `
                        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
                        
                        /* 選択範囲のハイライトを全体に適用 */
                        ::selection {
                            background-color: rgba(56, 189, 248, 0.3) !important;
                        }
                        
                        /* 暗い背景のプレビュー領域用のハイライト */
                        .preview-content ::selection {
                            background-color: rgba(56, 189, 248, 0.4) !important;
                            color: #ffffff !important;
                        }
                    `}} />
                </div>
            );
        }

        // --- Render React App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
